<!DOCTYPE html>
<html lang="en">
<head>
    <title>User Settings — Nexus Technology Industries</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --bg-main: #f8fafc;
            --panel-bg: #ffffff;
            --border-color: #e2e8f0;
            --primary-blue: #1e3a8a;
            --accent-blue: #2563eb;
            --text-dark: #0f172a;
            --text-muted: #475569;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-main);
            margin: 0;
            padding: 30px;
            color: var(--text-dark);
            min-height: 100vh;
            box-sizing: border-box;
            animation: pageFadeIn 0.6s ease-out;
        }

        .header-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--panel-bg);
            padding: 16px 24px;
            border-radius: 16px;
            margin-bottom: 30px;
            border: 1px solid var(--border-color);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        h1 {
            margin: 0;
            font-size: 24px;
            font-weight: 700;
        }

        .back-btn {
            background: linear-gradient(135deg, var(--primary-blue), var(--accent-blue));
            color: white;
            text-decoration: none;
            padding: 10px 18px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 14px;
            display: inline-block;
            transition: transform 0.2s;
            box-shadow: 0 4px 10px rgba(37, 99, 235, 0.15);
        }

        .back-btn:hover {
            transform: translateY(-2px);
        }

        .settings-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
            gap: 25px;
        }

        .settings-card {
            background: var(--panel-bg);
            padding: 28px;
            border-radius: 20px;
            border: 1px solid var(--border-color);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 10px 15px -3px rgba(0, 0, 0, 0.03);
        }

        h3 {
            margin-top: 0;
            margin-bottom: 20px;
            color: var(--primary-blue);
            font-size: 18px;
            font-weight: 600;
            border-bottom: 2px solid var(--bg-main);
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input {
            width: 100%;
            padding: 12px 14px;
            background: #ffffff;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            color: var(--text-dark);
            font-size: 14px;
            transition: all 0.25s ease;
            box-sizing: border-box;
        }

        input:focus {
            border-color: var(--accent-blue);
            outline: none;
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
        }

        input[readonly] {
            background: #f1f5f9;
            color: #64748b;
            cursor: not-allowed;
        }

        .save-btn {
            width: 100%;
            background: linear-gradient(135deg, var(--primary-blue), var(--accent-blue));
            color: white;
            border: none;
            padding: 12px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            box-shadow: 0 4px 10px rgba(37, 99, 235, 0.15);
            transition: all 0.2s;
        }

        .save-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(37, 99, 235, 0.25);
        }

        .flash-messages {
            margin-bottom: 20px;
        }

        .flash-banner {
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 10px;
            border: 1px solid transparent;
        }
        
        .flash-banner.success {
            background-color: #f0fdf4;
            color: #16a34a;
            border-color: #bbf7d0;
        }

        .flash-banner.error {
            background-color: #fef2f2;
            color: #dc2626;
            border-color: #fca5a5;
        }

        @keyframes pageFadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="header-container">
        <h1>⚙️ Account User Settings</h1>
        <a href="/portal" class="back-btn">← Back to Portal</a>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            <div class="flash-messages">
                {% for category, message in messages %}
                    <div class="flash-banner {{ 'error' if category == 'error' else 'success' }}">
                        {{ message }}
                    </div>
                {% endfor %}
            </div>
        {% endif %}
    {% endwith %}

    <div class="settings-grid">
        <!-- Card 1: Profile Values -->
        <div class="settings-card">
            <h3>📋 Profile Values</h3>
            <form method="POST" action="/settings">
                <input type="hidden" name="action" value="update_profile">
                
                <div class="form-group">
                    <label>Username (System ID)</label>
                    <input type="text" value="{{ current_user.username }}" readonly>
                </div>

                <div class="form-group">
                    <label>Assigned System Role</label>
                    <input type="text" value="{{ current_user.role }}" readonly>
                </div>

                <div class="form-group">
                    <label>Full Display Name</label>
                    <input type="text" name="name" value="{{ current_user.name }}" required>
                </div>

                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" name="email" value="{{ current_user.email }}" required>
                </div>

                <button type="submit" class="save-btn">Update Profile Info</button>
            </form>
        </div>

        <!-- Card 2: Security Controls -->
        <div class="settings-card">
            <h3>🔒 Security Controls</h3>
            <form method="POST" action="/settings">
                <input type="hidden" name="action" value="change_password">
                
                <div class="form-group">
                    <label>Current Account Password</label>
                    <input type="password" name="current_password" placeholder="••••••••" required>
                </div>

                <div class="form-group">
                    <label>New Secure Password</label>
                    <input type="password" name="new_password" placeholder="Minimum 4 characters" required>
                </div>

                <div class="form-group">
                    <label>Confirm New Password</label>
                    <input type="password" name="confirm_password" placeholder="Repeat new password" required>
                </div>

                <button type="submit" class="save-btn" style="background: linear-gradient(135deg, #1e293b, #475569); box-shadow: 0 4px 10px rgba(15,23,42,0.15);">Update Password</button>
            </form>
        </div>
    </div>

</body>
</html>
