<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Nexus Technology Industries Limited</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --primary: #2563eb;
            --primary-glow: #3b82f6;
            --text-main: #ffffff;
            --glass-bg: rgba(15, 23, 42, 0.65);
            --glass-border: rgba(255, 255, 255, 0.08);
            --input-bg: rgba(255, 255, 255, 0.05);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            height: 100vh;
            overflow: hidden;
            background: 
                radial-gradient(circle at 15% 15%, rgba(37, 99, 235, 0.25), transparent 35%),
                radial-gradient(circle at 85% 85%, rgba(29, 78, 216, 0.2), transparent 35%),
                linear-gradient(135deg, #020617, #070a13, #0f172a);
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            perspective: 1000px;
        }
        
        /* Interactive Background Grid Network */
        body::before {
            content: "";
            position: absolute;
            width: 200%;
            height: 200%;
            background:
                linear-gradient(rgba(255, 255, 255, 0.015) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.015) 1px, transparent 1px);
            background-size: 60px 60px;
            animation: moveGrid 24s linear infinite;
            z-index: 1;
        }

        .login-container {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 5;
        }

        /* High-End Glassmorphism Card Wrapper Layout */
        .login-box {
            width: 440px;
            padding: 50px 45px;
            background: var(--glass-bg);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--glass-border);
            border-radius: 28px;
            box-shadow: 
                0 4px 30px rgba(0, 0, 0, 0.2),
                0 20px 50px rgba(0, 0, 0, 0.4),
                inset 0 1px 1px rgba(255, 255, 255, 0.1);
            text-align: center;
            box-sizing: border-box;
            animation: boxIn 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            transition: transform 0.5s cubic-bezier(0.25, 1, 0.5, 1), box-shadow 0.5s;
        }

        .login-box:hover {
            transform: translateY(-6px) rotateX(2deg) rotateY(-2deg);
            box-shadow: 
                0 10px 40px rgba(37, 99, 235, 0.15),
                0 30px 70px rgba(0, 0, 0, 0.5),
                inset 0 1px 2px rgba(255, 255, 255, 0.15);
        }

        .logo-wrapper {
            position: relative;
            display: inline-block;
            margin-bottom: 20px;
        }

        .logo {
            font-size: 56px;
            filter: drop-shadow(0 0 16px rgba(37, 99, 235, 0.6));
            animation: subtleGlow 3s ease-in-out infinite alternate;
        }

        .company-name {
            color: var(--text-main);
            font-size: 23px;
            font-weight: 700;
            margin-bottom: 6px;
            letter-spacing: 0.5px;
            line-height: 1.3;
        }

        .title {
            color: #94a3b8;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 35px;
            letter-spacing: 0.75px;
            text-transform: uppercase;
        }

        .input-group {
            position: relative;
            margin-bottom: 18px;
            text-align: left;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            background: var(--input-bg);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 12px;
            box-sizing: border-box;
            font-size: 14px;
            color: #f8fafc;
            transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
        }

        input::placeholder {
            color: #64748b;
        }

        input:hover {
            border-color: rgba(255, 255, 255, 0.25);
            background: rgba(255, 255, 255, 0.08);
        }

        input:focus {
            border-color: var(--primary);
            background: rgba(15, 23, 42, 0.6);
            outline: none;
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.18);
        }

        .password-container {
            position: relative;
            width: 100%;
        }

        .password-container input {
            padding-right: 48px;
        }

        .toggle-password {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            font-size: 16px;
            color: #64748b;
            user-select: none;
            transition: color 0.2s;
        }

        .toggle-password:hover {
            color: #94a3b8;
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--primary), #1d4ed8);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            letter-spacing: 0.5px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.25);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(37, 99, 235, 0.4);
            background: linear-gradient(135deg, #3b82f6, var(--primary));
        }

        button:active {
            transform: translateY(0);
        }

        .error-card {
            color: #f87171;
            background: rgba(239, 68, 68, 0.08);
            padding: 12px 14px;
            border-radius: 12px;
            font-size: 13.5px;
            margin-bottom: 22px;
            border: 1px solid rgba(239, 68, 68, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            animation: shake 0.4s ease-in-out;
        }

        .footer {
            margin-top: 35px;
            color: #475569;
            font-size: 11.5px;
            font-weight: 500;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        /* Fluid Aesthetic Mesh Emitters */
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(40px);
            mix-blend-mode: screen;
            opacity: 0.45;
            animation: orbit 12s ease-in-out infinite alternate;
            z-index: 2;
        }

        .orb-1 {
            width: 280px;
            height: 280px;
            background: rgba(37, 99, 235, 0.3);
            top: -40px;
            left: -40px;
        }

        .orb-2 {
            width: 320px;
            height: 320px;
            background: rgba(29, 78, 216, 0.25);
            bottom: -60px;
            right: -60px;
            animation-delay: -4s;
        }

        /* Cinematic Animation Keyframes */
        @keyframes moveGrid {
            0% { transform: translate(0, 0); }
            100% { transform: translate(-60px, -60px); }
        }   

        @keyframes boxIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes subtleGlow {
            from { filter: drop-shadow(0 0 12px rgba(37, 99, 235, 0.4)); }
            to { filter: drop-shadow(0 0 24px rgba(59, 130, 246, 0.7)); }
        }

        @keyframes orbit {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(20px, -20px) scale(1.05); }
            100% { transform: translate(-10px, 15px) scale(0.95); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-4px); }
            40%, 80% { transform: translateX(4px); }
        }
    </style>
</head>
<body>

<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<div class="login-container">
    <div class="login-box">
        <div class="logo-wrapper">
            <div class="logo">🖥️</div>
        </div>
        <div class="company-name">Nexus Technology Industries Limited</div>
        <div class="title">IT Asset Management System</div>
        
        {% if error %}
            <div class="error-card">
                <span>⚠️</span> {{ error }}
            </div>
        {% endif %}

        <form method="POST" action="">
            <div class="input-group">
                <input type="text" name="username" placeholder="Username" autocomplete="username" required>
            </div>
            <div class="input-group">
                <div class="password-container">
                    <input type="password" id="password" name="password" placeholder="Password" autocomplete="current-password" required>
                    <span id="toggle-icon" class="toggle-password" onclick="togglePassword()">👁️</span>
                </div>
            </div>
            <button type="submit" style="margin-top: 12px;">Sign In</button>
        </form>

        <div class="footer">Asset Tracking & Management Portal</div>
    </div>
</div>

<script>
function togglePassword() {
    const passwordField = document.getElementById("password");
    const toggleIcon = document.getElementById("toggle-icon");
    if (passwordField.type === "password") {
        passwordField.type = "text";
        toggleIcon.innerText = "🕶️"; 
    } else {
        passwordField.type = "password";
        toggleIcon.innerText = "👁️";
    }
}
</script>

</body>
</html>
