<!DOCTYPE html>
<html>
<head>
    <title>Reports Dashboard — IT Asset Management System</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
    body {
        font-family: 'Segoe UI', sans-serif;
        background: #f4f7fc;
        margin: 20px;
        color: #333;
    }

    .nav-back {
        margin-bottom: 20px;
    }

    .nav-back button {
        background: #1e3a8a;
        color: white;
        border: none;
        padding: 10px 18px;
        border-radius: 8px;
        cursor: pointer;
        font-weight: 600;
    }

    .nav-back button:hover {
        background: #2563eb;
    }

    .download-box {
        background: white;
        padding: 30px;
        border-radius: 15px;
        box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        max-width: 600px;
        margin: 40px auto;
        text-align: center;
    }

    .download-box h1 {
        color: #1e40af;
        margin-bottom: 25px;
        font-size: 28px;
    }

    .download-box select {
        width: 100%;
        padding: 12px;
        margin-bottom: 15px;
        border: 1px solid #d1d5db;
        border-radius: 8px;
        font-size: 15px;
        box-sizing: border-box;
    }

    .button-group {
        display: flex;
        justify-content: center;
        gap: 15px;
        margin-top: 10px;
    }

    .view-btn {
        background: #2563eb;
        color: white;
        border: none;
        padding: 12px 25px;
        border-radius: 8px;
        cursor: pointer;
        font-weight: bold;
        font-size: 15px;
        transition: 0.2s;
    }

    .view-btn:hover {
        background: #1d4ed8;
    }

    .download-btn {
        background: #16a34a;
        color: white;
        border: none;
        padding: 12px 25px;
        border-radius: 8px;
        cursor: pointer;
        font-weight: bold;
        font-size: 15px;
        transition: 0.2s;
    }

    .download-btn:hover {
        background: #15803d;
    }
</style>
</head>
<body>

<div class="nav-back">
    <button onclick="window.location.href='/assets'">← Back to Dashboard</button>
</div>

<div class="download-box">
    <h1>📊 Reports Dashboard</h1>

    <form method="GET">
        <select name="report_type" required>
            <option value="">Select Report Type</option>
            <option value="assets">Assets Report</option>
            <option value="assignments">Assignments Report</option>
            <option value="tickets">Tickets Report</option>
            <option value="transactions">Asset History Report</option>
        </select>

        <select name="format" id="formatSelect">
            <option value="excel">Excel (.xlsx)</option>
            <option value="pdf" selected>PDF (.pdf)</option>
        </select>

        <div class="button-group">
            <button type="submit" formaction="/view_report" class="view-btn">
                👁 View Report
            </button>
            
            <button type="submit" formaction="/download_report" class="download-btn">
                ⬇ Download Report
            </button>
        </div>
    </form>
</div>

</body>
</html>
